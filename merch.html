<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Velozza — Merchandise</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    :root { --accent: #d11a12; }
    body { background-color: #050505; color: white; }
    .merch-card:hover { border-color: var(--accent); transition: 0.3s; }
  </style>
</head>
<body class="antialiased">

  <header class="bg-black/90 sticky top-0 z-50 border-b border-white/10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html"><img src="materiaal/velozza_distressed_logo-transparant2.webp" class="h-12" alt="Velozza"></a>
      <nav class="space-x-4 text-sm uppercase font-bold tracking-widest">
        <a href="index.html" class="hover:text-[var(--accent)]">Home</a>
        <a href="discography.html" class="hover:text-[var(--accent)]">Music</a>
      </nav>
    </div>
  </header>

  <section class="max-w-6xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold mb-2">Merchandise</h1>
    <p class="text-gray-400 mb-10">Direct support for the band. Worldwide shipping available.</p>

    <div id="merchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="text-zinc-500">Loading gear...</div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // Same config as your Admin page
    const firebaseConfig = {
      apiKey: "AIzaSyAj7nzvflTuXerUQ9LzOnn7TRojw4ZHlkc",
      authDomain: "velozza-events.firebaseapp.com",
      projectId: "velozza-events",
      storageBucket: "velozza-events.firebasestorage.app",
      messagingSenderId: "125892769650",
      appId: "1:125892769650:web:81deb40d2b0a7e7bb58feb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const stripe = Stripe('pk_test_51TLJReDdvX4x3QrxinvVCumfTVLpAqgmm3Y5zJIwMX8bVIjyUwWUgSyIOUEyWusoLMcWOqXYzNJfQGGjrqlm9esw00fjn6qLLN'); // REPLACE THIS

    const merchGrid = document.getElementById('merchGrid');

    // Load Products
    const q = query(collection(db, 'products'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
      merchGrid.innerHTML = '';
      snap.forEach(docSnap => {
        const p = docSnap.data();
        const isOutOfStock = p.stock <= 0;

        merchGrid.innerHTML += `
          <div class="merch-card bg-zinc-900 border border-white/5 rounded-lg overflow-hidden flex flex-col">
            <img src="${p.image || 'materiaal/placeholder.webp'}" class="w-full aspect-square object-cover">
            <div class="p-6 flex flex-col flex-grow">
              <h3 class="text-xl font-bold">${p.name}</h3>
              <p class="text-sm text-gray-400 mt-2 flex-grow">${p.description || ''}</p>
              <div class="mt-4 flex justify-between items-center">
                <span class="text-xl font-semibold text-[var(--accent)]">€${p.price}</span>
                <span class="text-xs uppercase ${isOutOfStock ? 'text-red-500' : 'text-zinc-500'}">
                  ${isOutOfStock ? 'Sold Out' : 'In Stock'}
                </span>
              </div>
              <button 
                onclick="handleCheckout('${p.stripeId}')" 
                ${isOutOfStock ? 'disabled' : ''}
                class="w-full mt-6 py-3 bg-[var(--accent)] text-white font-bold rounded hover:bg-red-700 transition disabled:bg-zinc-800 disabled:text-zinc-600">
                ${isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
              </button>
            </div>
          </div>
        `;
      });
    });

    // Stripe Redirect Function
    window.handleCheckout = (priceId) => {
      stripe.redirectToCheckout({
        lineItems: [{ price: priceId, quantity: 1 }],
        mode: 'payment',
        // Update these to your real URLs
        successUrl: window.location.origin + '/success.html', 
        cancelUrl: window.location.href,
      }).then(result => {
        if (result.error) alert(result.error.message);
      });
    };
  </script>
</body>
</html>
